apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "mcp.kuadrant.io/v1alpha1",
          "kind": "MCPGatewayExtension",
          "metadata": {
            "name": "mcp-gateway-extension",
            "namespace": "mcp-system"
          },
          "spec": {
            "targetRef": {
              "group": "gateway.networking.k8s.io",
              "kind": "Gateway",
              "name": "mcp-gateway",
              "namespace": "gateway-system",
              "sectionName": "mcp"
            }
          }
        },
        {
          "apiVersion": "mcp.kuadrant.io/v1alpha1",
          "kind": "MCPServerRegistration",
          "metadata": {
            "name": "example-server",
            "namespace": "mcp-test"
          },
          "spec": {
            "prefix": "example_",
            "targetRef": {
              "group": "gateway.networking.k8s.io",
              "kind": "HTTPRoute",
              "name": "example-route"
            }
          }
        },
        {
          "apiVersion": "mcp.kuadrant.io/v1alpha1",
          "kind": "MCPVirtualServer",
          "metadata": {
            "name": "example-vs",
            "namespace": "default"
          },
          "spec": {
            "description": "example virtual server",
            "tools": [
              "server1_tool1",
              "server2_tool2"
            ]
          }
        }
      ]
    capabilities: Basic Install
    categories: Integration & Delivery
    containerImage: ghcr.io/kuadrant/mcp-controller:latest
    description: An Envoy-based gateway for Model Context Protocol (MCP) servers
    repository: https://github.com/Kuadrant/mcp-gateway
    support: kuadrant
  name: mcp-gateway.v0.0.0
  namespace: placeholder
spec:
  customresourcedefinitions:
    owned:
      - description: Extends a Gateway API Gateway to handle MCP traffic by deploying a broker-router and configuring Envoy.
        displayName: MCP Gateway Extension
        kind: MCPGatewayExtension
        name: mcpgatewayextensions.mcp.kuadrant.io
        version: v1alpha1
      - description: Registers an upstream MCP server for tool federation through the gateway.
        displayName: MCP Server Registration
        kind: MCPServerRegistration
        name: mcpserverregistrations.mcp.kuadrant.io
        version: v1alpha1
      - description: Defines a virtual MCP server that exposes a curated subset of tools from registered servers.
        displayName: MCP Virtual Server
        kind: MCPVirtualServer
        name: mcpvirtualservers.mcp.kuadrant.io
        version: v1alpha1
  description: |-
    MCP Gateway is an Envoy-based gateway for Model Context Protocol (MCP) servers.
    It federates tools from multiple upstream MCP servers behind a single gateway endpoint,
    providing authentication, authorization, and routing through Envoy.

    The controller watches MCPGatewayExtension, MCPServerRegistration, and MCPVirtualServer
    custom resources to dynamically configure the gateway. The broker-router component is
    deployed automatically when an MCPGatewayExtension is reconciled.
  displayName: MCP Gateway
  icon:
    - base64data: 
      mediatype: image/png
  installModes:
    - supported: true
      type: OwnNamespace
    - supported: true
      type: SingleNamespace
    - supported: false
      type: MultiNamespace
    - supported: true
      type: AllNamespaces
  keywords:
    - mcp
    - gateway
    - model-context-protocol
    - envoy
    - kubernetes
  links:
    - name: MCP Gateway
      url: https://github.com/Kuadrant/mcp-gateway
    - name: Documentation
      url: https://github.com/Kuadrant/mcp-gateway/tree/main/docs
  maintainers:
    - email: mcp-gateway@kuadrant.io
      name: Kuadrant
  maturity: preview
  minKubeVersion: "1.28.0"
  provider:
    name: Kuadrant
    url: https://kuadrant.io
  version: 0.0.0
