name: MCP Conformance Tests

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - 'charts/**'
      - '.coderabbit.yaml'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - 'charts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CONFORMANCE_VERSION: "0.1.15"
  MCP_URL: "http://mcp.127-0-0-1.sslip.io:8001/mcp"

jobs:
  conformance-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Create Kind cluster
        run: kind create cluster --name mcp-gateway --config config/kind/cluster-ci.yaml

      - name: Setup CI environment
        run: |
          make ci-setup
          kubectl apply -k config/mcp-gateway/base/ -n mcp-system

      - name: Deploy conformance server
        run: make deploy-conformance-server

      - name: Wait for conformance server to get ready
        run: sleep 10

      - name: Run MCP conformance tests
        run: |
          SCENARIOS=(
            server-initialize
            tools-list
            ping
            tools-call-simple-text
            tools-call-image
            tools-call-audio
            tools-call-embedded-resource
            tools-call-mixed-content
            tools-call-error
            tools-call-with-progress
          )
          for scenario in "${SCENARIOS[@]}"; do
            echo "=== Running scenario: $scenario ==="
            npx @modelcontextprotocol/conformance@${CONFORMANCE_VERSION} server \
              --url ${MCP_URL} \
              --scenario "$scenario"
          done

      - name: Collect logs on failure
        if: failure()
        run: |
          make ci-debug-logs
          echo "=== Conformance server logs ==="
          kubectl logs -n mcp-test deployment/conformance-server --tail=50
