name: Build Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Custom image tag (e.g. nightly, dev-branch-name). Leave empty to use default Git-based tags."
        required: false
        type: string
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - 'charts/**'
      - 'evals/**'
      - 'tests/servers/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - 'charts/**'
      - 'evals/**'
      - 'tests/servers/**'
  merge_group:
    types: [ checks_requested ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: mcp-gateway
            dockerfile: Dockerfile
          - image: mcp-controller
            dockerfile: Dockerfile.controller

    steps:
      - name: Validate custom tag
        if: github.event_name == 'workflow_dispatch' && inputs.image_tag != ''
        run: |
          TAG="${{ inputs.image_tag }}"
          if [[ "$TAG" =~ ^v[0-9] ]]; then
            echo "::error::Custom tag '$TAG' matches release tag format (vX.Y.Z). Use git tags for releases instead."
            exit 1
          fi
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+ ]]; then
            echo "::error::Custom tag '$TAG' matches semver format. Use git tags for releases instead."
            exit 1
          fi
          if [[ "$TAG" == "latest" || "$TAG" == "main" ]]; then
            echo "::error::Custom tag '$TAG' is reserved and cannot be used."
            exit 1
          fi
          echo "Custom tag '$TAG' is valid"

      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ matrix.image }}
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.image_tag }},enable=${{inputs.image_tag != ''}}

      - name: Print Docker metadata for debugging
        run: |
          echo "Image: ${{ matrix.image }}"
          echo "Generated Tags: ${{ steps.meta.outputs.tags }}"
          echo "Generated Labels: ${{ steps.meta.outputs.labels }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare build args
        id: build-args
        run: |
          VERSION="${GITHUB_REF_NAME}"
          GIT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION="pr-${{ github.event.pull_request.number }}"
          fi
          LDFLAGS="-X main.version=${VERSION} -X main.gitSHA=${GIT_SHA}"
          echo "ldflags=${LDFLAGS}" >> $GITHUB_OUTPUT

      - name: Build and Push Image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LDFLAGS=${{ steps.build-args.outputs.ldflags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  build-bundle:
    name: Build Bundle Image
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Install tools
        run: make olm-tools

      - name: Generate bundle
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.ref_name }}
        run: |
          make bundle \
            VERSION=${{ steps.version.outputs.version }} \
            REGISTRY=${{ env.REGISTRY }} \
            ORG=${{ steps.owner.outputs.name }} \
            IMAGE_TAG="${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push bundle image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./bundle.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/mcp-controller-bundle:${{ inputs.image_tag || github.ref_name }}

  build-catalog:
    name: Build Catalog Image
    needs: build-bundle
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Install tools
        run: make olm-tools

      - name: Generate catalog
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.ref_name }}
        run: |
          make catalog \
            REGISTRY=${{ env.REGISTRY }} \
            ORG=${{ steps.owner.outputs.name }} \
            IMAGE_TAG="${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push catalog image
        uses: docker/build-push-action@v5
        with:
          context: ./catalog
          file: ./catalog/mcp-gateway-catalog.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/mcp-controller-catalog:${{ inputs.image_tag || github.ref_name }}
